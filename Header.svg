<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Cabecera del perfil de J. Santiago Ravelo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1422"/>
      <stop offset="45%" stop-color="#1b263b"/>
      <stop offset="100%" stop-color="#3a4d6b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#8a6fd1"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <radialGradient id="halo" cx="78%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#667eea" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#5b7099" stroke-width="0.6" stroke-opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>
  <rect width="1200" height="220" fill="url(#grid)"/>
  <rect width="1200" height="220" fill="url(#halo)"/>

  <!-- Constelacion / red de nodos (motivo de ingenieria) -->
  <g stroke="#7d93c4" stroke-width="1" stroke-opacity="0.35" fill="none">
    <path d="M905 58 L985 96 L1060 60 L1120 110 M985 96 L1015 158 L1090 150 M905 58 L880 128 L1015 158"/>
  </g>
  <g fill="#9fb2dd">
    <circle cx="905" cy="58" r="3.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="985" cy="96" r="4.2" fill="#a9b9ff"><animate attributeName="opacity" values="1;0.45;1" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="1060" cy="60" r="3"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="110" r="2.6"/>
    <circle cx="1015" cy="158" r="3.4" fill="#b9a6e0"><animate attributeName="opacity" values="0.5;1;0.5" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle cx="1090" cy="150" r="2.4"/>
    <circle cx="880" cy="128" r="2.8"/>
  </g>

  <!-- Glifo de codigo sutil -->
  <text x="58" y="150" font-family="'Courier New', monospace" font-size="120" font-weight="700" fill="#5b7099" fill-opacity="0.12">&lt;/&gt;</text>

  <!-- Onda inferior -->
  <path d="M0 178 Q300 138 600 162 T1200 146 L1200 220 L0 220 Z" fill="#0d1b2a" opacity="0.55"/>
  <path d="M0 192 Q320 162 640 182 T1200 172 L1200 220 L0 220 Z" fill="#0a1422" opacity="0.6"/>

  <!-- Linea de acento con brillo -->
  <rect x="0" y="214" width="1200" height="6" fill="url(#accent)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="3.2s" repeatCount="indefinite"/>
  </rect>
</svg>
